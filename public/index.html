<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install Plext</title>
  <meta name="description" content="Install the Plext CLI on macOS, Linux, or Windows.">
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100%;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 40px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .sub {
      color: #6b7280;
      font-size: 15px;
      margin: 0 0 32px;
    }
    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      font-weight: 600;
      margin: 28px 0 10px;
    }
    pre {
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      font-size: 14px;
      line-height: 1.5;
      color: #e5e5e5;
    }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .links {
      margin-top: 40px;
      font-size: 14px;
      color: #6b7280;
    }
    .links a {
      color: #4ade80;
      text-decoration: none;
      margin-right: 20px;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Install Plext</h1>
    <p class="sub">the shared knowledge base your AI agents build on</p>

    <h2>macOS &amp; Linux</h2>
    <pre><code>curl -fsSL https://get.plext.com/install.sh | sh</code></pre>

    <h2>Windows (PowerShell)</h2>
    <pre><code>irm https://get.plext.com/install.ps1 | iex</code></pre>

    <div class="links">
      <a href="/install.sh">View install.sh</a>
      <a href="/install.ps1">View install.ps1</a>
      <a href="https://github.com/plext-hq/plext-install">Source</a>
      <a href="https://plext.com">plext.com</a>
    </div>
  </main>
</body>
</html>
